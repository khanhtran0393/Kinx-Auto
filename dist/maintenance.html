<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bảo Trì Hệ Thống</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 16px;
            color: #ffffff;
        }
        p {
            font-size: 15px;
            color: #9ca3af;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        button {
            background: linear-gradient(135deg, #a78bfa 0%, #6366f1 100%);
            color: #ffffff;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(99, 102, 241, 0.45);
        }
        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bảo Trì Hệ Thống</h1>
        <p>Hệ thống đang tiến hành bảo trì định kỳ. Vui lòng quay lại sau.</p>
        <button id="exitBtn">Thoát Ứng Dụng</button>
    </div>
    <script src="maintenance.js"></script>
</body>
</html>
